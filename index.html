<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Bill Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #218838; }
        .result { margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid #eee; }
        .total-line { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧾 Bill Calculator</h2>
    
    <div class="input-group">
        <label>Item Price ($)</label>
        <input type="number" id="price" placeholder="0.00" step="0.01">
    </div>

    <div class="input-group">
        <label>Quantity</label>
        <input type="number" id="quantity" value="1" min="1">
    </div>

    <div class="input-group">
        <label>Tax Rate (%)</label>
        <input type="number" id="tax" value="5" step="0.1">
    </div>

    <button onclick="calculateBill()">Calculate Total</button>

    <div class="result" id="resultArea" style="display:none;">
        <div class="total-line">
            <span>Total Amount:</span>
            <span id="totalDisplay">$0.00</span>
        </div>
    </div>
</div>

<script>
    function calculateBill() {
        // 1. Get values from inputs
        const price = parseFloat(document.getElementById('price').value) || 0;
        const qty = parseInt(document.getElementById('quantity').value) || 0;
        const taxRate = parseFloat(document.getElementById('tax').value) || 0;

        // 2. Perform Math
        const subtotal = price * qty;
        const taxAmount = subtotal * (taxRate / 100);
        const finalTotal = subtotal + taxAmount;

        // 3. Display Result
        document.getElementById('totalDisplay').innerText = '$' + finalTotal.toFixed(2);
        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
